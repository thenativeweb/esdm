server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # YAML has had application/yaml as its official MIME type since
    # RFC 9512 (2024). nginx does not ship the mapping out of the
    # box, so we add it locally and use it as the default for any
    # response that goes through the schema endpoints.
    types {
        application/yaml yaml;
    }
    default_type application/yaml;

    # Conservative caching: clients revalidate hourly via ETag.
    # Schema URLs are stable per major version, but we keep room
    # for non-breaking patches to propagate quickly.
    add_header Cache-Control "public, max-age=3600" always;

    # The schemas are public; allow any origin to fetch them so
    # browser-based tools can use them without proxying.
    add_header Access-Control-Allow-Origin "*" always;

    # Identifier form: /<name>/v<N> – serve the matching .yaml file.
    location ~ ^/[a-z][a-z0-9-]*/v[0-9]+$ {
        try_files $uri.yaml =404;
    }

    # Direct .yaml form, for curl-friendly access.
    location ~ ^/[a-z][a-z0-9-]*/v[0-9]+\.yaml$ {
        try_files $uri =404;
    }

    # Anything else, including the root, returns 404.
    location / {
        return 404;
    }
}
