site_name: Event-Sourced Domain Modeling
site_description: ESDM is the Event-Sourced Domain Modeling language for describing event-sourced domains as YAML, with built-in tools to manage them.
site_url: https://www.esdm.io/
repo_url: https://github.com/thenativeweb/esdm
repo_name: thenativeweb/esdm

theme:
  name: material
  custom_dir: docs/overrides
  logo: images/logo.svg
  favicon: images/favicon.svg

  palette:
    scheme: slate
    primary: black
    accent: teal

  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.keys
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - guides
        - snippets
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - social

extra:
  generator: false

extra_css:
  - overrides/overrides.css

strict: true

validation:
  omitted_files: warn
  links:
    absolute_links: relative_to_docs

nav:
  - "": index.md
  - Introduction:
      - What is ESDM: introduction/what-is-esdm.md
      - Use Cases: introduction/use-cases.md
      - Design Principles: introduction/design-principles.md
      - License: introduction/license.md
  - Getting Started:
      - Installing ESDM: getting-started/installing-esdm.md
      - Updating ESDM: getting-started/updating-esdm.md
      - Your First Model with AI: getting-started/your-first-model-with-ai.md
      - Your First Model by Hand: getting-started/your-first-model.md
      - Running esdm lint: getting-started/running-esdm-lint.md
      - Running esdm view: getting-started/running-esdm-view.md
      - Running esdm glossary: getting-started/running-esdm-glossary.md
      - Running esdm documentation: getting-started/running-esdm-documentation.md
