properties:
    scope:
        type: object
        properties:
            domain:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
        required: [domain]
        additionalProperties: false
    deliveryGuarantee:
        type: string
        enum: [at-least-once, at-most-once]
    idempotency:
        type: object
        properties:
            owner:
                type: string
                enum:
                    - self
                    - downstream
                    - infrastructure
                    - none
                    - not-required
            strategy:
                type: string
        required: [owner]
        additionalProperties: false
    correlatedBy:
        oneOf:
            - type: object
              properties:
                source:
                    const: event-field
                field:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
              required: [source, field]
              additionalProperties: false
    state:
        type: object
    invariants:
        type: array
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                rule:
                    type: string
            required: [name, rule]
            additionalProperties: false
    constraints:
        type: array
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                rule:
                    type: string
            required: [name, rule]
            additionalProperties: false
    startsWhen:
        type: array
        minItems: 1
        items:
            oneOf:
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    aggregate:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                  required: [boundedContext, aggregate, event]
                  additionalProperties: false
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                  required: [boundedContext, event]
                  additionalProperties: false
    endsWhen:
        type: array
        minItems: 1
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                condition:
                    type: string
            required: [name, condition]
            additionalProperties: false
    timers:
        type: array
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                description:
                    type: string
            required: [name]
            oneOf:
                - properties:
                    after:
                        type: object
                        properties:
                            value:
                                type: integer
                                minimum: 1
                            unit:
                                type: string
                                enum: [seconds, minutes, hours, days, weeks, months, years]
                        required: [value, unit]
                        additionalProperties: false
                  required: [after]
                - properties:
                    at:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                  required: [at]
            unevaluatedProperties: false
    reactions:
        type: array
        minItems: 1
        items:
            type: object
            properties:
                when:
                    oneOf:
                        - oneOf:
                            - type: object
                              properties:
                                boundedContext:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                aggregate:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                event:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                              required: [boundedContext, aggregate, event]
                              additionalProperties: false
                            - type: object
                              properties:
                                boundedContext:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                event:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                              required: [boundedContext, event]
                              additionalProperties: false
                        - type: object
                          properties:
                            timer:
                                type: string
                                pattern: "^[a-z][a-z0-9-]*$"
                          required: [timer]
                          additionalProperties: false
                rule:
                    type: string
                emits:
                    type: array
                    items:
                        oneOf:
                            - type: object
                              properties:
                                boundedContext:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                aggregate:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                command:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                              required: [boundedContext, aggregate, command]
                              additionalProperties: false
                            - type: object
                              properties:
                                boundedContext:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                dynamicConsistencyBoundary:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                                command:
                                    type: string
                                    pattern: "^[a-z][a-z0-9-]*$"
                              required: [boundedContext, dynamicConsistencyBoundary, command]
                              additionalProperties: false
                setTimers:
                    type: array
                    items:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                cancelTimers:
                    type: array
                    items:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
            required: [when, rule]
            additionalProperties: false
required:
    - scope
    - deliveryGuarantee
    - correlatedBy
    - state
    - startsWhen
    - endsWhen
    - reactions
allOf:
    - if:
        properties:
            deliveryGuarantee:
                const: at-least-once
        required: [deliveryGuarantee]
      then:
        required: [idempotency]
