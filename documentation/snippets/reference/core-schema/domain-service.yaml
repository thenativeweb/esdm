properties:
    scope:
        type: object
        properties:
            domain:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
            boundedContext:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
        required: [domain, boundedContext]
        additionalProperties: false
    functions:
        type: array
        minItems: 1
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                description:
                    type: string
                arguments:
                    type: object
                returns:
                    type: object
                rules:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                type: string
                                pattern: "^[a-z][a-z0-9-]*$"
                            rule:
                                type: string
                        required: [name, rule]
                        additionalProperties: false
            required: [name, arguments, returns]
            additionalProperties: false
required: [scope, functions]
