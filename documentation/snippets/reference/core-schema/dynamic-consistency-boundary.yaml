properties:
    scope:
        type: object
        properties:
            domain:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
            boundedContext:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
        required: [domain, boundedContext]
        additionalProperties: false
    identifiedBy:
        type: array
        minItems: 1
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
            required: [name]
            oneOf:
                - properties:
                    source:
                        const: command-payload
                    field:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                  required: [source, field]
                - properties:
                    source:
                        const: static
                    value:
                        type: string
                        minLength: 1
                  required: [source, value]
                - properties:
                    source:
                        const: generated
                    generator:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                  required: [source, generator]
            unevaluatedProperties: false
    consults:
        type: array
        minItems: 1
        items:
            oneOf:
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    aggregate:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    criteria:
                        type: string
                  required: [boundedContext, aggregate, event, criteria]
                  additionalProperties: false
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    criteria:
                        type: string
                  required: [boundedContext, event, criteria]
                  additionalProperties: false
    invariants:
        type: array
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                rule:
                    type: string
            required: [name, rule]
            additionalProperties: false
required: [scope, identifiedBy, consults]
