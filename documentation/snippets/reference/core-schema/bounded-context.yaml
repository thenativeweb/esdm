properties:
    scope:
        type: object
        properties:
            domain:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
        required: [domain]
        additionalProperties: false
    ubiquitousLanguage:
        type: array
        minItems: 1
        items:
            type: object
            properties:
                term:
                    type: string
                    minLength: 1
                definition:
                    type: string
                    minLength: 1
                avoid:
                    type: array
                    minItems: 1
                    items:
                        type: object
                        properties:
                            term:
                                type: string
                                minLength: 1
                            reason:
                                type: string
                                minLength: 1
                        required: [term]
                        additionalProperties: false
            required: [term, definition]
            additionalProperties: false
required: [scope]
