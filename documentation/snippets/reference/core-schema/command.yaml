properties:
    scope:
        oneOf:
            - type: object
              properties:
                domain:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                boundedContext:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                aggregate:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
              required: [domain, boundedContext, aggregate]
              additionalProperties: false
            - type: object
              properties:
                domain:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                boundedContext:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                dynamicConsistencyBoundary:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
              required: [domain, boundedContext, dynamicConsistencyBoundary]
              additionalProperties: false
    data:
        type: object
    publishes:
        type: array
        minItems: 1
        items:
            type: string
            pattern: "^[a-z][a-z0-9-]*$"
    actors:
        type: array
        minItems: 1
        items:
            type: string
            pattern: "^[a-z][a-z0-9-]*$"
    constraints:
        type: array
        items:
            type: object
            properties:
                name:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                rule:
                    type: string
            required: [name, rule]
            additionalProperties: false
required: [scope, data, publishes]
