type: object
properties:
    name:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
    description:
        type: string
    given:
        type: array
        items:
            oneOf:
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    aggregate:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    data:
                        type: object
                  required: [boundedContext, aggregate, event, data]
                  additionalProperties: false
                - type: object
                  properties:
                    boundedContext:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    event:
                        type: string
                        pattern: "^[a-z][a-z0-9-]*$"
                    data:
                        type: object
                  required: [boundedContext, event, data]
                  additionalProperties: false
    when:
        type: object
        properties:
            command:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
            data:
                type: object
            actor:
                type: string
                pattern: "^[a-z][a-z0-9-]*$"
        required: [command, data]
        additionalProperties: false
    then:
        oneOf:
            - type: object
              properties:
                events:
                    type: array
                    items:
                        type: object
                        properties:
                            event:
                                type: string
                                pattern: "^[a-z][a-z0-9-]*$"
                            data:
                                type: object
                        required: [event, data]
                        additionalProperties: false
              required: [events]
              additionalProperties: false
            - type: object
              properties:
                rejection:
                    type: object
                    properties:
                        invariant:
                            type: string
                            pattern: "^[a-z][a-z0-9-]*$"
                    required: [invariant]
                    additionalProperties: false
              required: [rejection]
              additionalProperties: false
required: [name, when, then]
additionalProperties: false
